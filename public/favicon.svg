<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#0A1628"/>
  <!-- Stylised "IDC" monogram — gold letter I with a small heart/lotus accent -->
  <!-- Vertical bar of I -->
  <rect x="28" y="14" width="8" height="36" rx="4" fill="#D4A853"/>
  <!-- Top serif -->
  <rect x="20" y="14" width="24" height="7" rx="3.5" fill="#D4A853"/>
  <!-- Bottom serif -->
  <rect x="20" y="43" width="24" height="7" rx="3.5" fill="#D4A853"/>
  <!-- Small coral accent dot -->
  <circle cx="32" cy="32" r="4" fill="#E8734A"/>
</svg>
